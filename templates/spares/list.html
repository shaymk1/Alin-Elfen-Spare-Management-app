{% extends "base.html" %} {% block title %}Spares - Spare Manager{% endblock %}
{% block content %}
<div class="card">
	<div class="card-header flex-between">
		<h1>Spare Items</h1>
		<a
			href="#"
			class="btn"
			target="_blank"
			>+ Add Spare</a
		>
	</div>
	<div class="card-body">
		<form
			method="GET"
			style="
				margin-bottom: 1rem;
				display: flex;
				gap: 0.5rem;
				align-items: center;
			">
			<input
				type="text"
				name="search"
				placeholder="Search spares..."
				style="flex: 1; padding: 0.5rem" />
			<select
				name="type"
				style="padding: 0.5rem; width: 120px; flex-shrink: 0">
				<option value="">All Types</option>
				<option value="reusable">Reusable</option>
				<option value="consumable">Consumable</option>
			</select>
			<button
				type="submit"
				class="btn"
				style="flex-shrink: 0">
				Search
			</button>
		</form>

		<table>
			<thead>
				<tr>
					<th>Name</th>
					<th>Part Number</th>
					<th>Type</th>
					<th>Stock</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Sample Bearing</td>
					<td>BRG-001</td>
					<td>Reusable</td>
					<td>10</td>
					<td>
						<a
							href="#"
							class="btn btn-secondary"
							>Edit</a
						>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</div>
{% endblock %}
